name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    env:
      PROJECT_ID: internal-sandbox-446612
      REGION: asia-south1
      REPO: my-docker-repo
      IMAGE: my-docker-app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud (OIDC)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/196053730058/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-runner-sa-demo@internal-sandbox-446612.iam.gserviceaccount.com

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: secure-cluster
        location: asia-south1-a

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

    - name: Deploy to GKE
      run: |
        kubectl set image deployment/${{ env.IMAGE }} \
        ${{ env.IMAGE }}=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

        kubectl rollout status deployment/${{ env.IMAGE }}
